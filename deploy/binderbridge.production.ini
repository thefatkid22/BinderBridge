; Production-oriented BinderBridge config for Docker Compose.
; docker-compose.yml mounts this file read-only at /config/binderbridge.ini.
; Environment variables from .env override these values.

[server]
host = 0.0.0.0
port = 8000
; Set BINDERBRIDGE_PUBLIC_BASE_URL in .env to the real HTTPS URL.
; public_base_url = https://cards.example.com

[app]
data_dir = /data
demo = false
source_url = https://github.com/thefatkid22/BinderBridge

[database]
busy_timeout_ms = 30000

[scryfall]
user_agent = BinderBridge/0.2.0-alpha.1 self-hosted collection manager
delay_seconds = 0.12
search_limit = 24
bulk_type = default_cards

[pricing]
scryfall_price_refresh_auto = true
scryfall_price_refresh_interval_hours = 24
price_refresh_batch_size = 25
price_refresh_delay_seconds = 0.25

[smtp]
; Prefer .env for SMTP secrets.
port = 587
tls = true
ssl = false

[notifications]
worker_interval_seconds = 60

[jobs]
; Compose runs a separate binderbridge-worker container.
enabled = true
mode = external
poll_seconds = 1
lease_seconds = 3600
retry_base_seconds = 30
retry_max_seconds = 3600
history_days = 30

[registration]
invite_expiry_days = 14

[security]
password_reset_expiry_minutes = 60

[backups]
auto_enabled = true
interval_hours = 24
retention_count = 14
retention_days = 30

[retention]
notification_days = 90
admin_log_days = 365
webhook_days = 90

[api]
page_size_max = 250

[rate_limits]
persistent = true
api_auth_failed_limit = 30
api_auth_failed_window_seconds = 300
api_health_limit = 120
api_health_window_seconds = 60
api_read_limit = 600
api_read_window_seconds = 60
api_write_limit = 120
api_write_window_seconds = 60
scryfall_lookup_limit = 30
scryfall_lookup_window_seconds = 300
integration_admin_limit = 20
integration_admin_window_seconds = 300

[webhooks]
worker_enabled = true
timeout_seconds = 5
delivery_interval_seconds = 30
delivery_batch_size = 20

[imports]
deck_import_max_bytes = 1500000

[limits]
max_request_body_bytes = 15728640
max_upload_bytes = 10485760
max_form_fields = 2000
max_form_value_length = 500000
max_csv_rows = 25000
max_card_quantity = 100000
