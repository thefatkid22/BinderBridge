; Copy this file to binderbridge.ini or point BINDERBRIDGE_CONFIG at another INI file.
; Environment variables still override matching config values.

[server]
host = 127.0.0.1
port = 8000
; public_base_url = https://cards.example.com
; Enable only when BinderBridge is reachable exclusively through a trusted reverse proxy.
trust_proxy_headers = false

[app]
; data_dir = ./data
demo = false
; source_url = https://github.com/thefatkid22/BinderBridge

[database]
busy_timeout_ms = 30000

[scryfall]
user_agent = BinderBridge/0.2.0-alpha.4 self-hosted collection manager
delay_seconds = 0.12
search_limit = 24
bulk_type = default_cards

[pricing]
scryfall_price_refresh_auto = true
scryfall_price_refresh_interval_hours = 24
price_refresh_batch_size = 25
price_refresh_delay_seconds = 0.25

[smtp]
; Used for registration invites, password recovery, and opt-in notification emails.
; host = smtp.example.com
port = 587
; username = user@example.com
; password = change-me
; from_address = BinderBridge <noreply@example.com>
tls = true
ssl = false

[notifications]
; Processes scheduled email digests, quiet-hour deferrals, and stale trade reminders.
worker_interval_seconds = 60

[jobs]
; Embedded runs the durable worker with the web process. Use external when running scripts/run_worker.py separately.
enabled = true
mode = embedded
poll_seconds = 1
lease_seconds = 3600
retry_base_seconds = 30
retry_max_seconds = 3600
history_days = 30

[registration]
invite_expiry_days = 14

[security]
; One-time password reset links expire after this many minutes.
password_reset_expiry_minutes = 60
; HTTPS public URLs enable Secure automatically. Set true to force it otherwise.
session_cookie_secure = false

[backups]
auto_enabled = true
interval_hours = 24
retention_count = 14
retention_days = 30

[retention]
; Defaults used until an admin saves retention settings from Maintenance Health.
; Set a value to 0 to keep that data forever.
notification_days = 90
admin_log_days = 365
webhook_days = 90

[api]
page_size_max = 250
; Lifetime for bearer sessions issued by Android username/password sign-in.
android_token_ttl_days = 90

[webhooks]
; Keep false unless trusted users intentionally send webhooks to LAN-only services.
allow_private_destinations = false

[rate_limits]
; Persistent limits are shared by app processes using the same SQLite database.
persistent = true
api_auth_failed_limit = 30
api_auth_failed_window_seconds = 300
api_health_limit = 120
api_health_window_seconds = 60
api_read_limit = 600
api_read_window_seconds = 60
api_write_limit = 120
api_write_window_seconds = 60
scryfall_lookup_limit = 30
scryfall_lookup_window_seconds = 300
integration_admin_limit = 20
integration_admin_window_seconds = 300

[webhooks]
worker_enabled = true
timeout_seconds = 5
delivery_interval_seconds = 30
delivery_batch_size = 20

[imports]
deck_import_max_bytes = 1500000

[limits]
max_request_body_bytes = 15728640
max_upload_bytes = 10485760
max_form_fields = 2000
max_form_value_length = 500000
max_csv_rows = 25000
max_card_quantity = 100000
