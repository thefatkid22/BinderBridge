; Copy this file to binderbridge.ini or point BINDERBRIDGE_CONFIG at another INI file.
; Environment variables still override matching config values.

[server]
host = 127.0.0.1
port = 8000
; public_base_url = https://cards.example.com

[app]
; data_dir = ./data
demo = false

[database]
busy_timeout_ms = 30000

[scryfall]
user_agent = BinderBridge/0.1 self-hosted collection manager
delay_seconds = 0.12
search_limit = 24
bulk_type = default_cards

[pricing]
scryfall_price_refresh_auto = true
scryfall_price_refresh_interval_hours = 24
price_refresh_batch_size = 25
price_refresh_delay_seconds = 0.25

[smtp]
; Used for registration invites and opt-in trade notification emails.
; host = smtp.example.com
port = 587
; username = user@example.com
; password = change-me
; from_address = BinderBridge <noreply@example.com>
tls = true
ssl = false

[notifications]
; Processes scheduled email digests, quiet-hour deferrals, and stale trade reminders.
worker_interval_seconds = 60

[registration]
invite_expiry_days = 14

[backups]
auto_enabled = true
interval_hours = 24
retention_count = 14
retention_days = 30

[retention]
; Defaults used until an admin saves retention settings from Maintenance Health.
; Set a value to 0 to keep that data forever.
notification_days = 90
admin_log_days = 365
webhook_days = 90

[api]
page_size_max = 250

[webhooks]
worker_enabled = true
timeout_seconds = 5
delivery_interval_seconds = 30
delivery_batch_size = 20

[imports]
deck_import_max_bytes = 1500000

[limits]
max_request_body_bytes = 15728640
max_upload_bytes = 10485760
max_form_fields = 2000
max_form_value_length = 500000
max_csv_rows = 25000
max_card_quantity = 100000
